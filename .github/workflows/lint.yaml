name: lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

# Cancel any previous runs of this workflow for the same PR.
concurrency:
  group: lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-doc:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3.4.8
        with:
          ocaml-compiler: 5.3.0
          dune-cache: true
          cache-prefix: v1
          # Skip automatic local-package pin/install — `just pin` below
          # must run first so pinned deps (e.g. nopal_svg) resolve.
          opam-local-packages: ""
      - name: Apply opam pins
        shell: bash
        run: just pin

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: |
            opam install -y odoc.3.1.0

      - uses: ocaml/setup-ocaml/lint-doc@v3.4.8

  lint-fmt:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3.4.8
        with:
          ocaml-compiler: 5.3.0
          dune-cache: true
          cache-prefix: v1
          # Skip automatic local-package pin/install — `just pin` below
          # must run first so pinned deps (e.g. nopal_svg) resolve.
          opam-local-packages: ""
      - name: Apply opam pins
        shell: bash
        run: just pin

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: |
            opam install -y ocamlformat.0.28.1

      - uses: ocaml/setup-ocaml/lint-fmt@v3.4.8

  lint-opam:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
        with:
          just-version: '1.46.0'
      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3.4.8
        with:
          ocaml-compiler: 5.3.0
          dune-cache: true
          cache-prefix: v1
          # Skip automatic local-package pin/install — `just pin` below
          # must run first so pinned deps (e.g. nopal_svg) resolve.
          opam-local-packages: ""
      - name: Apply opam pins
        shell: bash
        run: just pin

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          command: |
            opam install -y opam-dune-lint

      - uses: ocaml/setup-ocaml/lint-opam@v3.4.8
