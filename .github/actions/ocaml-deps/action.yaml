name: ocaml-deps
description: Install OCaml dependencies

runs:
  using: "composite"

  steps:
    - uses: ocaml/setup-ocaml@v3.4.8
      with:
        ocaml-compiler: 5.3.0
        opam-version: "2.5.0"
        dune-cache: true
        dune-cache-prefix: v1
        opam-disable-sandboxing: true
        # Skip automatic local-package pin/install — our `just pin` step
        # below must run first so pinned deps (e.g. nopal_svg) resolve.
        opam-local-packages: ""

    - name: Update opam
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 10
        max_attempts: 5
        command: |
          opam update
        shell: bash

    - name: Apply opam pins
      shell: bash
      run: just pin

    - name: Install dependencies
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 5
        max_attempts: 3
        command: opam install -y --deps-only -t .
        shell: bash
